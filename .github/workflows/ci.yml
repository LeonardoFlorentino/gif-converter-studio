name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate package metadata
        run: npm pkg get name version main

      - name: Verify required project files
        run: |
          test -f src/main.js
          test -f src/preload.js
          test -f src/renderer/index.html
          test -f src/renderer/renderer.js
          test -f src/renderer/styles.css
